spring:
  application:
    name: yu-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-max
        enabled: false
      embedding:
        enabled: true
        options:
          model: text-embedding-v2
      connection-timeout: 30000
      read-timeout: 1200000
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:0.6b
#    vectorstore:
#      pgvector:
#        index-type: HNSW
#        dimensions: 1536
#        distance-type: COSINE_DISTANCE
#        max-document-batch-size: 10000
    mcp:
      client:
        request-timeout: 120s
        stdio:
          servers-configuration: classpath:mcp-server.json




  datasource:
    url: "${MYSQL_URL:jdbc:mysql://localhost:3306/yu_ai_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 1
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
# ... existing code ...

chat:
  memory:
    redis:
      ttl: 2592000
      max-history: 100


server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000  # Cookie有效期30天
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.cxy.travelaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-plus:
  mapper-locations: classpath*:generator/mapper/*.xml

# searchApi
search-api:
  api-key: ${SEARCH_API_KEY:}


travel:
  auth:
    jwt-secret: ${JWT_SECRET:change-this-dev-secret-for-yu-travel-agent}
    token-ttl-seconds: 604800
    session-key-prefix: "travel:auth:session:"
  rag:
    init-documents: false
    init-batch-size: 25
  mcp:
    required-keys:
      pexels: ${PEXELS_API_KEY:}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    bucketName: ${ALIYUN_OSS_BUCKET:java-cxy}
    region: ${ALIYUN_OSS_REGION:cn-beijing}

logging:
  level:
    com.cxy.travelaiagent.App.TravelApp: INFO
    org.springframework.ai.model.tool: DEBUG
    org.springframework.ai.autoconfigure.mcp: DEBUG
    org.springframework.ai.mcp: DEBUG
    io.modelcontextprotocol: DEBUG
